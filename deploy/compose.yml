name: yomu-reader

# 一键部署：
#   docker compose up -d
# 首次启动自动创建管理员 admin，初始密码看日志：
#   docker compose logs reader-core | grep admin
# 打开 http://localhost:8080 登录，然后到「用户」页改密码。
#
# 公网访问：用 frp / Caddy / Nginx 把流量转发到 127.0.0.1:8080 即可，
# 无需其他配置（反向代理需转发原始 Host 头，Caddy 默认如此）。
# 需要 WebView 书源时：docker compose --profile webview up -d

services:
  # 网页界面 + 安全网关（唯一对外的服务）
  yomu-app:
    image: docker.io/komqaq/yomu-reader:app-latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # 局域网直接访问改成 "8080:8080"
    volumes:
      - reader-storage:/storage:ro
    depends_on:
      reader-core:
        condition: service_healthy

  # 书源抓取与数据存储（不对外开放）
  reader-core:
    image: docker.io/komqaq/yomu-reader:core-latest
    restart: unless-stopped
    volumes:
      # 全部数据都在这里。想直接落盘便于备份：
      # 把三处 reader-storage 都改成绝对路径，如 /srv/yomu-data
      - reader-storage:/app/storage

  # 可选：WebView 书源（内置 Chromium，约 800MB 内存，多数人用不到）
  webview-bridge:
    profiles: ["webview"]
    image: docker.io/komqaq/yomu-reader:webview-latest
    restart: unless-stopped
    shm_size: 512mb
    volumes:
      - reader-storage:/storage:ro

volumes:
  reader-storage:
